<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Приветствие</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #89f7fe, #66a6ff);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .container {
                background: rgba(255,255,255,0.9);
                padding: 30px 40px;
                border-radius: 12px;
                box-shadow: 0 8px 25px rgba(0,0,0,0.1);
                text-align: center;
            }
            .form-input {
                padding: 10px;
                margin-bottom: 15px;
                border: 1px solid #ccc;
                border-radius: 5px;
                width: 80%;
                max-width: 300px;
            }
            .submit-btn {
                padding: 10px 20px;
                background: linear-gradient(45deg, #ff7e5f, #feb47b);
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 1em;
            }
            .submit-btn:hover {
                opacity: 0.9;
            }
            .message {
                margin-top: 20px;
                font-size: 1.2em;
                color: #333;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Введите своё имя</h1>
            <form method="post">
                {% csrf_token %} <!-- Защита от CSRF -->
                {{ form.as_p }}
                <button type="submit" class="submit-btn">Submit</button>
            </form>
            {% if message %}
            <div class="message">{{ message }}</div>
            {% endif %}
        </div>
    </body>
</html>
