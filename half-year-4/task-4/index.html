<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Интерактивный калькулятор</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="calculator">
        <input type="text" id="num1" placeholder="Введите первое число">
        <input type="text" id="num2" placeholder="Введите второе число">

        <button onclick="calculate('sum')">сумма</button>
        <button onclick="calculate('difference')">разность</button>
        <button onclick="calculate('product')">произведение</button>
        <button onclick="calculate('division')">деление</button>

        <div id="result"></div>
    </div>

    <script src="js/script.js"></script>

</body>

</html>
