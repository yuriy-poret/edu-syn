<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Простейший счётчик</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(105deg, #087211, #2575fc, #087211);
            font-family: Arial, sans-serif;
        }

        .counter {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .result {
            font-size: 3em;
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .buttons button {
            font-size: 1.5em;
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: linear-gradient(100deg, #ff7e5f, #feb47b);
            color: white;
            transition: opacity 0.3s;
        }

        .buttons button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            font-size: 1.2em;
            color: white;
        }
    </style>
</head>

<body>

    <div class="counter">
        <div class="result" id="result">0</div>
        <div class="buttons">
            <button id="minus">−</button>
            <button id="plus">+</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        const resultEl  = document.getElementById('result');
        const plusBtn   = document.getElementById('plus');
        const minusBtn  = document.getElementById('minus');
        const messageEl = document.getElementById('message');

        let count = 0;

        function updateDisplay() {
            resultEl.textContent = count;

            if (count > 0) {
                resultEl.style.background = 'yellow';
            } else if (count < 0) {
                resultEl.style.background = 'green';
            } else {
                resultEl.style.background = 'red';
            }

            plusBtn.disabled  = count >= 10;
            minusBtn.disabled = count <= -10;

            if (count === 10 || count === -10) {
                messageEl.textContent = 'Вы достигли экстремального значения';
            } else {
                messageEl.textContent = '';
            }
        }

        plusBtn.addEventListener('click', () => {
            if (count < 10) {
                count++;
                updateDisplay();
            }
        });

        minusBtn.addEventListener('click', () => {
            if (count > -10) {
                count--;
                updateDisplay();
            }
        });

        updateDisplay();
    </script>

</body>

</html>
